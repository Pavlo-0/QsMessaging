    <circle cx="180" cy="-20" r="30" fill="#0ea5e9" />
    <circle cx="210" cy="155" r="38" fill="#14b8a6" />
    <circle cx="35" cy="175" r="46" fill="#fb7185" />
    <path d="M0 0L180 -20L210 155L35 175L0 0Z" fill="none" stroke="#f8fafc" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M35 175L180 -20" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round" />
